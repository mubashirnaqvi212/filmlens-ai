services:
  - type: web
    name: filmlens-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./filmlens.db
      - key: SECRET_KEY
        value: filmlens-production-secret-key
